<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="380" height="380">
  <defs>
    <!-- Cyan Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background to ensure visibility if viewed directly -->
  <rect width="400" height="400" fill="transparent"/>

  <g transform="translate(200,200)" filter="url(#glow)">
    
    <!-- Outer decorative corner brackets -->
    <path d="M -180 -120 L -180 -180 L -120 -180 M 180 -120 L 180 -180 L 120 -180 M -180 120 L -180 180 L -120 180 M 180 120 L 180 180 L 120 180" fill="none" stroke="#4895B4" stroke-width="3" opacity="0.6" />

    <!-- Outer Dashed Ring (Slow Clockwise) -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#00f3ff" stroke-width="2" stroke-dasharray="15 5 5 5 30 10" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite" />
    </circle>

    <!-- Thick Segmented Ring (Medium Counter-Clockwise) -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#4895B4" stroke-width="12" stroke-dasharray="50 150 50 150" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite" />
    </circle>
    
    <!-- Inner Dotted Ring (Fast Clockwise) -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#00f3ff" stroke-width="4" stroke-dasharray="4 8" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite" />
    </circle>

    <!-- Tech Arcs (Sweeping effect) -->
    <path d="M -80 0 A 80 80 0 0 1 80 0" fill="none" stroke="#00f3ff" stroke-width="6" stroke-linecap="round" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M -60 0 A 60 60 0 0 0 60 0" fill="none" stroke="#4895B4" stroke-width="4" stroke-linecap="round" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4s" repeatCount="indefinite" />
    </path>

    <!-- Core Pulsing Circle -->
    <circle cx="0" cy="0" r="30" fill="#00f3ff" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite" />
      <animate attributeName="r" values="28;32;28" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00f3ff" stroke-width="2">
      <animate attributeName="r" values="30;35;30" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Center Crosshairs -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#00f3ff" stroke-width="1" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" />
    </line>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#00f3ff" stroke-width="1" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" />
    </line>
    
    <!-- Text overlays -->
    <text x="0" y="-160" font-family="monospace" font-size="12" fill="#00f3ff" text-anchor="middle" letter-spacing="2">SYSTEM ONLINE</text>
    <text x="0" y="170" font-family="monospace" font-size="10" fill="#4895B4" text-anchor="middle" letter-spacing="4">SCANNING...</text>
    <text x="0" y="4" font-family="monospace" font-size="10" font-weight="bold" fill="#00f3ff" text-anchor="middle">A.I.</text>

  </g>
</svg>
